<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #globe-container {
            width: 100vw;
            height: 100vh;
        }

        #info-panel {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 30, 0.85);
            border: 1px solid rgba(100, 140, 200, 0.25);
            border-radius: 12px;
            padding: 12px 24px;
            color: #c0cfe0;
            font-size: 13px;
            letter-spacing: 0.5px;
            pointer-events: none;
            backdrop-filter: blur(8px);
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s;
        }

        #info-panel.visible {
            opacity: 1;
        }

        #info-panel .planet-name {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
        }

        #controls-hint {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 30, 0.7);
            border: 1px solid rgba(100, 140, 200, 0.15);
            border-radius: 10px;
            padding: 14px 18px;
            color: rgba(180, 200, 230, 0.7);
            font-size: 11px;
            line-height: 1.8;
            backdrop-filter: blur(6px);
        }

        #controls-hint kbd {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 4px;
            padding: 1px 6px;
            font-family: inherit;
            color: rgba(200, 220, 255, 0.9);
        }
    </style>
</head>
<body>
    <div id="globe-container"></div>
    <div id="info-panel">
        <div class="planet-name"></div>
        <div class="planet-details"></div>
    </div>
    <div id="controls-hint">
        <kbd>Click</kbd> planet for info<br>
        <kbd>Scroll</kbd> to zoom<br>
        <kbd>Drag</kbd> to orbit<br>
        <kbd>Space</kbd> pause rotation
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.getElementById('globe-container').appendChild(renderer.domElement);

        camera.position.set(30, 20, 50);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 200;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.15;

        // ============ STARFIELD ============
        const starsGeometry = new THREE.BufferGeometry();
        const starsVertices = [];
        const starsColors = [];
        for (let i = 0; i < 20000; i++) {
            const r = 800 + Math.random() * 1200;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starsVertices.push(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.sin(phi) * Math.sin(theta),
                r * Math.cos(phi)
            );
            const c = new THREE.Color();
            c.setHSL(Math.random() * 0.2 + 0.55, 0.4, Math.random() * 0.3 + 0.7);
            starsColors.push(c.r, c.g, c.b);
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        starsGeometry.setAttribute('color', new THREE.Float32BufferAttribute(starsColors, 3));
        const starsMaterial = new THREE.PointsMaterial({
            size: 0.4,
            transparent: true,
            opacity: 0.85,
            sizeAttenuation: true,
            vertexColors: true
        });
        scene.add(new THREE.Points(starsGeometry, starsMaterial));

        // ============ SUN ============
        const sunGeometry = new THREE.SphereGeometry(3, 64, 64);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffcc44 });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // Sun glow
        const sunGlowGeo = new THREE.SphereGeometry(3.6, 32, 32);
        const sunGlowMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                void main() {
                    float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.5);
                    gl_FragColor = vec4(1.0, 0.85, 0.3, 1.0) * intensity * 1.2;
                }
            `,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide,
            transparent: true
        });
        scene.add(new THREE.Mesh(sunGlowGeo, sunGlowMat));

        // Outer corona
        const coronaGeo = new THREE.SphereGeometry(5.0, 32, 32);
        const coronaMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                void main() {
                    float intensity = pow(0.45 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 4.0);
                    gl_FragColor = vec4(1.0, 0.7, 0.2, 1.0) * intensity * 0.4;
                }
            `,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide,
            transparent: true
        });
        scene.add(new THREE.Mesh(coronaGeo, coronaMat));

        // Sun point light
        const sunLight = new THREE.PointLight(0xfff5e0, 2.5, 500);
        sunLight.position.set(0, 0, 0);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.15);
        scene.add(ambientLight);

        // ============ PLANET DATA ============
        const planetData = [
            { name: 'Mercury', radius: 0.35, distance: 7, speed: 4.15, color: 0x8c7e6d, roughness: 0.95, metalness: 0.1, detail: 'Diameter: 4,879 km · Closest to Sun · No atmosphere' },
            { name: 'Venus', radius: 0.6, distance: 10, speed: 1.62, color: 0xd4a574, roughness: 0.8, metalness: 0.05, detail: 'Diameter: 12,104 km · 462°C surface · Thick CO₂ atmosphere' },
            { name: 'Earth', radius: 0.65, distance: 14, speed: 1.0, color: 0x4488cc, roughness: 0.6, metalness: 0.1, detail: 'Diameter: 12,742 km · Our home · Liquid water & life', hasMoon: true, hasAtmosphere: true },
            { name: 'Mars', radius: 0.45, distance: 18, speed: 0.53, color: 0xc1603d, roughness: 0.9, metalness: 0.08, detail: 'Diameter: 6,779 km · The Red Planet · Olympus Mons' },
            { name: 'Jupiter', radius: 1.8, distance: 26, speed: 0.084, color: 0xc4a882, roughness: 0.7, metalness: 0.0, detail: 'Diameter: 139,820 km · Gas giant · Great Red Spot', hasRing: false, hasBands: true },
            { name: 'Saturn', radius: 1.5, distance: 34, speed: 0.034, color: 0xd4c49a, roughness: 0.7, metalness: 0.0, detail: 'Diameter: 116,460 km · Iconic rings · 146 known moons', hasRing: true },
            { name: 'Uranus', radius: 1.0, distance: 42, speed: 0.012, color: 0x7ec8c8, roughness: 0.6, metalness: 0.05, detail: 'Diameter: 50,724 km · Ice giant · Tilted 98° on its axis', hasRing: true, ringColor: 0x5599aa },
            { name: 'Neptune', radius: 0.95, distance: 50, speed: 0.006, color: 0x3355bb, roughness: 0.6, metalness: 0.05, detail: 'Diameter: 49,244 km · Windiest planet · 1,600 km/h storms' }
        ];

        const planets = [];
        const orbitLines = [];
        const planetMeshes = [];

        // Procedural planet texture
        function createPlanetTexture(baseColor, type) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const col = new THREE.Color(baseColor);

            for (let y = 0; y < 256; y++) {
                for (let x = 0; x < 512; x++) {
                    const nx = x / 512, ny = y / 256;
                    let noise = Math.sin(nx * 30 + ny * 20) * 0.05 +
                                Math.sin(nx * 60 - ny * 40) * 0.03 +
                                Math.sin(nx * 15 + ny * 50) * 0.04;
                    
                    if (type === 'bands') {
                        noise += Math.sin(ny * Math.PI * 12) * 0.12 +
                                 Math.sin(ny * Math.PI * 24 + nx * 4) * 0.06;
                    }
                    
                    if (type === 'rocky') {
                        noise += (Math.random() - 0.5) * 0.08;
                        // Crater-like features
                        for (let i = 0; i < 8; i++) {
                            const cx = (Math.sin(i * 3.7) * 0.5 + 0.5);
                            const cy = (Math.cos(i * 2.3) * 0.5 + 0.5);
                            const dist = Math.sqrt((nx - cx) ** 2 + (ny - cy) ** 2);
                            if (dist < 0.06) {
                                noise -= (0.06 - dist) * 2.0;
                            }
                        }
                    }

                    if (type === 'earth') {
                        // Simplistic land/water
                        const landNoise = Math.sin(nx * 20 + 1) * Math.cos(ny * 15 + 2) +
                                          Math.sin(nx * 35 - ny * 25) * 0.5;
                        if (landNoise > 0.3) {
                            col.setHex(0x3a7d44);
                            noise += 0.05;
                        } else {
                            col.setHex(0x2266aa);
                        }
                        // Polar caps
                        if (ny < 0.1 || ny > 0.9) {
                            col.setHex(0xddeeff);
                            noise += 0.1;
                        }
                    }

                    const r = Math.min(255, Math.max(0, (col.r + noise) * 255));
                    const g = Math.min(255, Math.max(0, (col.g + noise) * 255));
                    const b = Math.min(255, Math.max(0, (col.b + noise) * 255));
                    
                    ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            
            return new THREE.CanvasTexture(canvas);
        }

        // Procedural normal map
        function createNormalMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            for (let y = 0; y < 256; y++) {
                for (let x = 0; x < 512; x++) {
                    const nx = (Math.sin(x * 0.1) * Math.cos(y * 0.15) + 1) * 0.5;
                    const ny = (Math.cos(x * 0.12) * Math.sin(y * 0.1) + 1) * 0.5;
                    ctx.fillStyle = `rgb(${(nx * 255)|0},${(ny * 255)|0},200)`;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            return new THREE.CanvasTexture(canvas);
        }

        const normalMap = createNormalMap();

        planetData.forEach((data, index) => {
            const group = new THREE.Group();
            scene.add(group);

            let texType = 'rocky';
            if (data.name === 'Earth') texType = 'earth';
            else if (data.hasBands || data.name === 'Jupiter') texType = 'bands';
            else if (data.name === 'Saturn') texType = 'bands';
            else if (data.name === 'Uranus' || data.name === 'Neptune') texType = 'bands';

            const texture = createPlanetTexture(data.color, texType);
            
            const geometry = new THREE.SphereGeometry(data.radius, 64, 64);
            const material = new THREE.MeshStandardMaterial({
                map: texture,
                normalMap: normalMap,
                normalScale: new THREE.Vector2(0.3, 0.3),
                roughness: data.roughness,
                metalness: data.metalness,
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            group.add(mesh);

            // Atmosphere for Earth
            if (data.hasAtmosphere) {
                const atmosGeo = new THREE.SphereGeometry(data.radius * 1.03, 48, 48);
                const atmosMat = new THREE.ShaderMaterial({
                    vertexShader: `
                        varying vec3 vNormal;
                        varying vec3 vWorldPos;
                        void main() {
                            vNormal = normalize(normalMatrix * normal);
                            vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vNormal;
                        varying vec3 vWorldPos;
                        void main() {
                            float intensity = pow(0.68 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.2);
                            vec3 col = vec3(0.35, 0.6, 1.0);
                            gl_FragColor = vec4(col, 1.0) * intensity * 0.7;
                        }
                    `,
                    blending: THREE.AdditiveBlending,
                    side: THREE.BackSide,
                    transparent: true
                });
                group.add(new THREE.Mesh(atmosGeo, atmosMat));
            }

            // Moon for Earth
            if (data.hasMoon) {
                const moonGeo = new THREE.SphereGeometry(0.15, 32, 32);
                const moonTex = createPlanetTexture(0x888888, 'rocky');
                const moonMat = new THREE.MeshStandardMaterial({
                    map: moonTex,
                    roughness: 1.0,
                    metalness: 0.0,
                    normalMap: normalMap,
                    normalScale: new THREE.Vector2(0.5, 0.5)
                });
                const moonMesh = new THREE.Mesh(moonGeo, moonMat);
                moonMesh.castShadow = true;
                group.add(moonMesh);
                data.moonMesh = moonMesh;
            }

            // Saturn / Uranus rings
            if (data.hasRing) {
                const innerR = data.radius * 1.4;
                const outerR = data.radius * 2.4;
                const ringGeo = new THREE.RingGeometry(innerR, outerR, 128);
                // Adjust UVs for ring texture
                const pos = ringGeo.attributes.position;
                const uv = ringGeo.attributes.uv;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i), y = pos.getY(i);
                    const dist = Math.sqrt(x * x + y * y);
                    uv.setXY(i, (dist - innerR) / (outerR - innerR), 0.5);
                }

                const ringCanvas = document.createElement('canvas');
                ringCanvas.width = 512;
                ringCanvas.height = 16;
                const rctx = ringCanvas.getContext('2d');
                const ringBaseColor = data.ringColor || 0xd4c49a;
                const rc = new THREE.Color(ringBaseColor);
                for (let x = 0; x < 512; x++) {
                    const t = x / 512;
                    const alpha = (Math.sin(t * Math.PI) * 0.7 + 0.3) * 
                                  (1 - Math.abs(Math.sin(t * 30)) * 0.3);
                    const bright = 0.7 + Math.sin(t * 50) * 0.15;
                    rctx.fillStyle = `rgba(${(rc.r*bright*255)|0},${(rc.g*bright*255)|0},${(rc.b*bright*255)|0},${alpha})`;
                    rctx.fillRect(x, 0, 1, 16);
                }
                const ringTex = new THREE.CanvasTexture(ringCanvas);

                const ringMat = new THREE.MeshStandardMaterial({
                    map: ringTex,
                    transparent: true,
                    side: THREE.DoubleSide,
                    roughness: 0.8,
                    metalness: 0.1,
                    depthWrite: false
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = -Math.PI * 0.45;
                if (data.name === 'Uranus') ring.rotation.x = -Math.PI * 0.02;
                group.add(ring);
            }

            // Orbit line
            const orbitCurve = new THREE.EllipseCurve(0, 0, data.distance, data.distance, 0, 2 * Math.PI, false, 0);
            const orbitPoints = orbitCurve.getPoints(128);
            const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
            const orbitMat = new THREE.LineBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.25 });
            const orbitLine = new THREE.Line(orbitGeo, orbitMat);
            orbitLine.rotation.x = -Math.PI / 2;
            scene.add(orbitLine);
            orbitLines.push(orbitLine);

            planets.push({ group, mesh, data, angle: Math.random() * Math.PI * 2 });
            planetMeshes.push(mesh);
        });

        // ============ ASTEROID BELT ============
        const asteroidCount = 600;
        const asteroidGeo = new THREE.BufferGeometry();
        const asteroidPositions = new Float32Array(asteroidCount * 3);
        const asteroidColors = new Float32Array(asteroidCount * 3);
        for (let i = 0; i < asteroidCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 21 + (Math.random() - 0.5) * 3;
            const h = (Math.random() - 0.5) * 1.0;
            asteroidPositions[i * 3] = Math.cos(angle) * dist;
            asteroidPositions[i * 3 + 1] = h;
            asteroidPositions[i * 3 + 2] = Math.sin(angle) * dist;
            const grey = 0.3 + Math.random() * 0.3;
            asteroidColors[i * 3] = grey;
            asteroidColors[i * 3 + 1] = grey * 0.9;
            asteroidColors[i * 3 + 2] = grey * 0.8;
        }
        asteroidGeo.setAttribute('position', new THREE.Float32BufferAttribute(asteroidPositions, 3));
        asteroidGeo.setAttribute('color', new THREE.Float32BufferAttribute(asteroidColors, 3));
        const asteroidMat = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, transparent: true, opacity: 0.6 });
        const asteroids = new THREE.Points(asteroidGeo, asteroidMat);
        scene.add(asteroids);

        // ============ RAYCASTER FOR CLICK ============
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const infoPanel = document.getElementById('info-panel');
        let infoPanelTimeout;

        renderer.domElement.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(planetMeshes);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const planet = planets.find(p => p.mesh === hit);
                if (planet) {
                    infoPanel.querySelector('.planet-name').textContent = planet.data.name;
                    infoPanel.querySelector('.planet-details').textContent = planet.data.detail;
                    infoPanel.classList.add('visible');
                    clearTimeout(infoPanelTimeout);
                    infoPanelTimeout = setTimeout(() => infoPanel.classList.remove('visible'), 4000);
                }
            }
        });

        // ============ ANIMATION ============
        let time = 0;
        let paused = false;

        function animate() {
            requestAnimationFrame(animate);
            if (!paused) time += 0.005;

            // Sun pulsing
            const sunScale = 1.0 + Math.sin(time * 8) * 0.01;
            sun.scale.set(sunScale, sunScale, sunScale);
            sunLight.intensity = 2.5 + Math.sin(time * 10) * 0.15;

            // Planets orbit
            planets.forEach(p => {
                p.angle += p.data.speed * 0.005 * (!paused ? 1 : 0);
                const x = Math.cos(p.angle) * p.data.distance;
                const z = Math.sin(p.angle) * p.data.distance;
                p.group.position.set(x, 0, z);
                p.mesh.rotation.y += 0.01;

                // Moon orbit
                if (p.data.moonMesh) {
                    const moonAngle = time * 3;
                    p.data.moonMesh.position.set(
                        Math.cos(moonAngle) * 1.2,
                        0.1,
                        Math.sin(moonAngle) * 1.2
                    );
                    p.data.moonMesh.rotation.y += 0.005;
                }
            });

            // Rotate asteroid belt slowly
            asteroids.rotation.y += 0.0001;

            // Star twinkle
            starsMaterial.opacity = 0.7 + Math.sin(time * 4) * 0.15;

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                paused = !paused;
            }
            if (e.code === 'KeyR') {
                controls.reset();
                camera.position.set(30, 20, 50);
            }
        });

        animate();
    </script>
</body>
</html>
